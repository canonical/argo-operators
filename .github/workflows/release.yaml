name: Release

on:
  push:
    branches:
      - main
      - track/**

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml
    secrets: inherit

  release:
    name: Release charm
    needs:
      - ci
    uses: canonical/data-platform-workflows/.github/workflows/release_charm_edge.yaml@main
    strategy:
      matrix:
        charm:
          - charms/argo-controller
    with:
      artifact-prefix: ${{ matrix.charm }}
      track: latest
      path-to-charm-directory: ${{ matrix.charm }}
    secrets:
      charmhub-token: ${{ secrets.CHARMCRAFT_CREDENTIALS }}
